version: '3.8'

services:
  # OpenSearch (for full-text search) - OPTIONAL
  # Enable with: docker-compose -f docker-compose.yml -f docker-compose.optional.yml up -d opensearch
  opensearch:
    image: opensearchproject/opensearch:latest
    container_name: legimi-opensearch
    environment:
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms256m -Xmx512m
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=LegimI@2024
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # MinIO (S3-compatible storage) - OPTIONAL
  # Enable with: docker-compose -f docker-compose.yml -f docker-compose.optional.yml up -d minio
  # Note: For production, use Supabase Storage instead
  minio:
    image: minio/minio:latest
    container_name: legimi-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/minio_data
    command: server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

volumes:
  opensearch_data:
    driver: local
  minio_data:
    driver: local
