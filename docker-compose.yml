version: '3.8'

services:
  # PostgreSQL Database (REQUIRED)
  postgres:
    image: postgres:15-alpine
    container_name: legimi-postgres
    environment:
      POSTGRES_USER: legimi_dev
      POSTGRES_PASSWORD: legimi_dev_password
      POSTGRES_DB: legimi_commerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legimi_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache (REQUIRED for performance)
  redis:
    image: redis:7-alpine
    container_name: legimi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# Optional services (uncomment to enable):
# 
# OpenSearch - for full-text search (OPTIONAL, heavy: requires 512MB+ RAM)
# Enable with: docker-compose -f docker-compose.yml -f docker-compose.optional.yml up -d
#
# MinIO - for S3-compatible storage (OPTIONAL, use Supabase Storage instead)
# Enable with: docker-compose -f docker-compose.yml -f docker-compose.optional.yml up -d

networks:
  default:
    name: legimi-network
